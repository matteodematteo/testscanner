<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Scanner Lab</title>
  <style>
    body{margin:0;font-family:"Segoe UI",sans-serif;background:#f5f1e8;color:#15202b}
    .app{max-width:980px;margin:0 auto;padding:16px}
    .card{background:#fffdf8;border:1px solid #ddd7ce;border-radius:20px;padding:14px;margin-top:12px;box-shadow:0 14px 32px rgba(0,0,0,.08)}
    .grid,.buttons,.stats{display:grid;gap:10px}
    .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .buttons{grid-template-columns:repeat(4,minmax(0,1fr));margin-top:10px}
    .stats{grid-template-columns:repeat(3,minmax(0,1fr));margin-top:10px}
    label{display:block;font-size:.75rem;color:#667;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
    select,input,button,textarea{font:inherit}
    select,input,button{width:100%;min-height:42px;border-radius:12px;border:1px solid #d7d9dd}
    select,input{padding:10px;background:#fff}
    button{font-weight:700;cursor:pointer}
    .primary{background:#0f766e;color:#fff;border-color:#0f766e}
    .stop{background:#9f1239;color:#fff;border-color:#9f1239}
    .preview{position:relative;margin-top:12px;background:#0d141c;border-radius:18px;overflow:hidden;aspect-ratio:4/3}
    .preview video,.preview .managed,.placeholder,.overlay{position:absolute;inset:0}
    .preview video,.preview .managed video,.preview .managed canvas{width:100%!important;height:100%!important;object-fit:cover;display:block}
    .managed[hidden]{display:none!important}
    .placeholder{display:grid;place-items:center;color:#fff;padding:18px;text-align:center;background:linear-gradient(180deg,rgba(0,0,0,.18),rgba(0,0,0,.6))}
    .overlay{pointer-events:none;display:grid;place-items:center}
    .scan-box{width:78%;height:30%;border:2px solid rgba(255,255,255,.92);border-radius:18px;box-shadow:0 0 0 999px rgba(0,0,0,.22)}
    .pill{display:inline-block;margin:8px 8px 0 0;padding:6px 10px;border-radius:999px;background:#eef1f4;color:#556;font-size:.8rem;font-weight:700}
    .value{min-height:44px;padding:10px;border:1px solid #e1e3e6;border-radius:12px;background:#fff}
    textarea{width:100%;min-height:180px;border:1px solid #d7d9dd;border-radius:12px;padding:10px;resize:vertical;margin-top:10px;font-family:Consolas,monospace}
    @media(max-width:760px){.grid,.buttons,.stats{grid-template-columns:1fr}.preview{aspect-ratio:1/1}}
  </style>
</head>
<body>
  <main class="app">
    <section class="card">
      <h1>Barcode Scanner Lab</h1>
      <p>Test major browser barcode libraries on the same iPhone.</p>
      <div class="grid" style="margin-top:12px">
        <div>
          <label for="engine">Library</label>
          <select id="engine">
            <option value="native">Native BarcodeDetector</option>
            <option value="ponyfill">barcode-detector ponyfill</option>
            <option value="zxing">ZXing Browser</option>
            <option value="html5qrcode">html5-qrcode</option>
            <option value="quagga">Quagga2</option>
          </select>
        </div>
        <div>
          <label for="camera">Camera</label>
          <select id="camera" disabled></select>
        </div>
        <div>
          <label for="formats">Format Set</label>
          <select id="formats">
            <option value="retail">Retail 1D</option>
            <option value="all1d">All 1D</option>
            <option value="all">All</option>
          </select>
        </div>
        <div>
          <label for="crop">Crop</label>
          <select id="crop">
            <option value="auto">Auto</option>
            <option value="full">Full</option>
            <option value="wide">Wide</option>
            <option value="square">Square</option>
          </select>
        </div>
      </div>
      <div class="buttons">
        <button id="start" class="primary" type="button">Start</button>
        <button id="stop" class="stop" type="button" disabled>Stop</button>
        <button id="refresh" type="button">Refresh Cameras</button>
        <input id="imageInput" type="file" accept="image/*" />
      </div>
      <div>
        <span id="status" class="pill">Idle</span>
        <span id="enginePill" class="pill">Engine: -</span>
        <span id="cameraPill" class="pill">Camera: -</span>
        <span id="formatPill" class="pill">Formats: -</span>
      </div>
      <div class="preview">
        <video id="video" autoplay playsinline muted></video>
        <div id="managed" class="managed" hidden></div>
        <div id="placeholder" class="placeholder">Tap Start to test the selected library.</div>
        <div class="overlay"><div class="scan-box"></div></div>
      </div>
    </section>
    <section class="card">
      <h2>Last Result</h2>
      <div class="stats">
        <div><label>Text</label><div id="resultText" class="value">-</div></div>
        <div><label>Format</label><div id="resultFormat" class="value">-</div></div>
        <div><label>Source</label><div id="resultSource" class="value">-</div></div>
      </div>
    </section>
    <section class="card">
      <h2>Debug Log</h2>
      <textarea id="log" readonly></textarea>
    </section>
  </main>
  <canvas id="workCanvas" hidden></canvas>
  <script src="https://fastly.jsdelivr.net/npm/barcode-detector@3/dist/iife/ponyfill.min.js"></script>
  <script src="https://unpkg.com/@zxing/browser@0.1.5"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.12.1/dist/quagga.min.js"></script>
  <script src="scanner-lab.js" defer></script>
</body>
</html>
